<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7a1f1f" />
    <title>Luring — Perpus FISIP ULM</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #fbf7f2;
        color: #2a1414;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a0f0f;
          color: #f3e9e6;
        }
      }
      .card {
        max-width: 26rem;
        text-align: center;
      }
      .badge {
        width: 88px;
        height: 88px;
        margin: 0 auto 20px;
        border-radius: 20px;
        background: #7a1f1f;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fbf7f2;
        font-size: 40px;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 20px;
        opacity: 0.75;
        line-height: 1.5;
        font-size: 0.95rem;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 10px;
        background: #7a1f1f;
        color: #fbf7f2;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 10px 20px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">📚</div>
      <h1>Anda sedang luring</h1>
      <p>
        Halaman ini belum tersimpan untuk dibuka tanpa internet. Katalog yang pernah dibuka tetap
        bisa dilihat. Sambungkan kembali untuk meminjam, mengembalikan, atau mengimpor buku.
      </p>
      <button onclick="location.reload()">Coba lagi</button>
    </div>
  </body>
</html>
